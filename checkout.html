<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShopEase | Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand text-warning fw-bold" href="index.html">

ShopEase

</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbar">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbar">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="products.html">Products</a>
</li>

<li class="nav-item">
<a class="nav-link" href="cart.html">Cart</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="checkout.html">Checkout</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- Checkout -->

<div class="container py-5">

<div class="row">

<!-- Billing -->

<div class="col-lg-7">

<div class="card shadow">

<div class="card-body">

<h3 class="mb-4">

Billing Details

</h3>

<form id="checkoutForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>First Name</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Last Name</label>

<input
type="text"
class="form-control"
required>

</div>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="tel"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Address</label>

<textarea
class="form-control"
rows="3"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>City</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Pincode</label>

<input
type="text"
class="form-control"
required>

</div>

</div>

<h5 class="mt-4">

Payment Method

</h5>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="payment"
checked>

<label class="form-check-label">

Cash on Delivery

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="payment">

<label class="form-check-label">

Credit / Debit Card

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="payment">

<label class="form-check-label">

UPI

</label>

</div>

<button
class="btn btn-success btn-lg mt-4 w-100">

Place Order

</button>

</form>

</div>

</div>

</div>

<!-- Order Summary -->

<div class="col-lg-5">

<div class="card shadow">

<div class="card-body">

<h3>

Order Summary

</h3>

<hr>

<div class="d-flex justify-content-between">

<p>HP Laptop</p>

<p>₹54,999</p>

</div>

<div class="d-flex justify-content-between">

<p>Boat Headphones</p>

<p>₹2,499</p>

</div>

<hr>

<div class="d-flex justify-content-between">

<strong>Subtotal</strong>

<strong>₹57,498</strong>

</div>

<div class="d-flex justify-content-between">

<p>Shipping</p>

<p>FREE</p>

</div>

<div class="d-flex justify-content-between">

<h4>Total</h4>

<h4 class="text-success">

₹57,498

</h4>

</div>

<hr>

<input
type="text"
class="form-control"
placeholder="Coupon Code">

<button
class="btn btn-warning mt-3 w-100">

Apply Coupon

</button>

</div>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center py-3 mt-5">

<p>

© 2026 ShopEase. All Rights Reserved.

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/checkout.js"></script>

</body>

</html>
